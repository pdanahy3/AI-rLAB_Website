<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI-rLAB — research lab website. Content and pages will expand over time."
    />
    <title>AI-rLAB</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="index.html">AI-rLAB</a>
        <nav class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="index.html" aria-current="page">Home</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="hero" aria-labelledby="hero-heading">
        <div class="hero__media">
          <!-- Add your image as assets/images/landing-hero.jpg (or update src below). See README for policies. -->
          <img
            class="hero__image"
            src="assets/images/landing-hero.jpg"
            alt="AI-rLAB — landing image. Replace this alt text when you add the real image."
            width="1920"
            height="1080"
            loading="eager"
            decoding="async"
          />
        </div>
        <div class="hero__overlay">
          <h1 id="hero-heading" class="hero__title">AI-rLAB</h1>
          <p class="hero__tagline">Research lab website — more content coming soon.</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="site-footer__note">
        <span data-year></span> AI-rLAB. Hosted with GitHub Pages.
      </p>
    </footer>

    <script src="js/main.js" defer></script>
  </body>
</html>
